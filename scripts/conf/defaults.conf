# Default configuration for Kiro installer

# Channel and version
CHANNEL="stable"
TARGET_VERSION=""

# Paths
DEFAULT_INSTALL_DIR="/opt/kiro"
USER_INSTALL_DIR="$HOME/.local/share/kiro"
SYMLINK_DIR_SYSTEM="/usr/local/bin"
SYMLINK_DIR_USER="$HOME/.local/bin"
DESKTOP_DIR_SYSTEM="/usr/share/applications"
DESKTOP_DIR_USER="$HOME/.local/share/applications"

# State and logs
STATE_DIR_SYSTEM="/var/lib/kiro"
STATE_DIR_USER="${XDG_STATE_HOME:-$HOME/.local/state}/kiro"
LOG_FILE_SYSTEM="/var/log/kiro/install.log"
LOG_FILE_USER="${XDG_STATE_HOME:-$HOME/.local/state}/kiro/install.log"

# Cache
CACHE_DIR_DEFAULT="${XDG_CACHE_HOME:-$HOME/.cache}/kiro"

# Behavior
NON_INTERACTIVE=false
DRY_RUN=false
VERBOSE=0
COLOR=auto
JSON_LOGS=false
SKIP_DEPS=false
SKIP_VERIFY=false
SKIP_HOOKS=false

# URLs
METADATA_URL="https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json"

